<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rebur</title>
    <link href="/favicon-64.png" rel="icon" sizes="64x64" type="image/png" />

    <script type="importmap">
      {
        "imports": {
          "@rebur/vendor/": "./dist/vendor/",
          "@rebur/engine": "./dist/engine.js",
          "@rebur/ui": "./dist/ui.js",
          "@rebur/ui/jsx-runtime": "./dist/ui-jsx.js"
        }
      }
    </script>

    <link rel="modulepreload" href="./dist/engine.js" as="script" />
    <link rel="modulepreload" href="./dist/client-main.js" as="script" />
    <link rel="modulepreload" href="./dist/vendor/rapier.js" as="script" />
    <link rel="modulepreload" href="./dist/vendor/pixi.js" as="script" />
    <link rel="modulepreload" href="./dist/vendor/zod.js" as="script" />

    <link rel="stylesheet" href="./dist/client-main.css" />
  </head>
  <body>
    <main id="layout">
      <div id="topbar">
        <div><span id="emoji-status">🟡</span> <span id="text-status">Connecting...</span></div>
        <div id="sign-in"></div>
      </div>
      <div id="viewport"><div id="game"></div></div>
    </main>

    <script type="module" src="./dist/client-main.js"></script>
  </body>
</html>
