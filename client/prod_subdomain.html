<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      iframe#gameiframe {
        width: 100%;
        height: 100vh;
        border: none; /* Remove border to ensure no extra height is added */
      }
    </style>
    <script>
      function getSubdomain() {
        // Get the subdomain from the hostname (e.g., cities.example.com → "cities")
        const hostname = window.location.hostname;

        // Split the hostname by dots
        const parts = hostname.split(".");

        // If there are more than 2 parts, the first one is the subdomain
        if (parts.length > 2) {
          return parts[0]; // This assumes subdomain.domain.tld structure
        } else {
          return "No subdomain"; // In case there's no subdomain
        }
      }

      async function fetchWorldId(sd) {
        const url = `/api/project/subdomain-to-id?subdomain=${sd}`;

        try {
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error("Network response was not ok");
          }

          const data = await response.json();

          return data;
        } catch (error) {
          document.getElementById("remark").textContent = `Error: ${error.message}`;
        }
      }

      async function startInstance(worldId) {
        const response = await fetch("/api/dashboard/start-instance", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ world_id: worldId }),
        });

        if (!response.ok) {
          throw new Error("Failed to start game instance");
        }

        const data = await response.json();
        return data.instance_id;
      }

      async function setup() {
        const subdomain = getSubdomain();
        const data = await fetchWorldId(subdomain);
        if (!data || !data.found) {
          document.getElementById("remark").innerText =
            "Error: Game with given subdomain not found.";
          return;
        }

        try {
          const instanceId = await startInstance(data.id);
          document.getElementById("remark").remove();
          document.getElementById("loading").remove();
          createGameIframe(instanceId);
        } catch (error) {
          document.getElementById("remark").innerText = `Error: ${error.message}`;
        }
      }

      function createGameIframe(instanceId) {
        const iframe = document.createElement("iframe");
        iframe.id = "gameiframe";
        iframe.src = `/?instance=${instanceId}`;
        iframe.style.border = "none";
        document.body.appendChild(iframe);

        // iframe.focus() does not work but this little incantation does
        iframe.addEventListener("load", () => {
          iframe.contentWindow.focus();
        });
      }

      window.onload = setup;
    </script>
  </head>
  <body>
    <h1 id="loading">Loading game</h1>
    <p id="remark">Looking up game...</p>
  </body>
</html>
