<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rebur Engine</title>
    <link href="/favicon-64.png" rel="icon" sizes="64x64" type="image/png" />

    <script type="importmap">
      {
        "imports": {
          "@dreamlab/vendor/": "./dist/vendor/",
          "@dreamlab/engine": "./dist/engine.js",
          "@dreamlab/ui": "./dist/ui.js",
          "@dreamlab/ui/jsx-runtime": "./dist/ui-jsx.js"
        }
      }
    </script>

    <link rel="modulepreload" href="./dist/engine.js" as="script" />
    <link rel="modulepreload" href="./dist/client-main.js" as="script" />
    <link rel="modulepreload" href="./dist/vendor/rapier.js" as="script" />
    <link rel="modulepreload" href="./dist/vendor/pixi.js" as="script" />
    <link rel="modulepreload" href="./dist/vendor/zod.js" as="script" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./dist/client-main.css" />
  </head>
  <body>
    <main id="layout">
      <div id="top-bar"></div>
      <div id="left-sidebar">
        <div id="left-center-drag"></div>
      </div>
      <div id="left-sidebar-drag"></div>
      <div id="gameview">
        <div id="viewport"><div id="games"></div></div>
      </div>
      <div id="right-sidebar-drag"></div>
      <div id="right-sidebar">
        <div id="right-center-drag"></div>
      </div>
      <div id="bottom-bar-drag"><div></div></div>
      <div id="bottom-bar"></div>
    </main>

    <script type="module" src="./dist/client-main.js"></script>
  </body>
</html>
